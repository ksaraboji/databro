<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#e0f2fe" rx="20"/>
  <!-- Stylized database cylinder -->
  <ellipse cx="50" cy="32" rx="22" ry="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <rect x="28" y="32" width="44" height="32" fill="#60a5fa" stroke="#2563eb" stroke-width="2" rx="10"/>
  <ellipse cx="50" cy="64" rx="22" ry="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <!-- Sparkle effect -->
  <circle cx="38" cy="24" r="2.2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="62" cy="22" r="1.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="50" cy="70" r="2.2" fill="#fbbf24" opacity="0.8"/>
  <!-- Data dots -->
  <circle cx="40" cy="48" r="2.5" fill="#06b6d4"/>
  <circle cx="50" cy="48" r="2.5" fill="#06b6d4"/>
  <circle cx="60" cy="48" r="2.5" fill="#06b6d4"/>
