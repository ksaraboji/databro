name: Deploy Azure Infrastructure

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "terraform/azure/**"
      - ".github/workflows/deploy-azure-infra.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "terraform/azure/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-dev:
    name: Terraform (dev)
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/azure
    permissions:
      contents: read
      pull-requests: write
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend-dev.hcl

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan (dev)
        id: plan
        run: terraform plan -var-file=dev.tfvars -no-color -input=false
        continue-on-error: true

      - name: Update Pull Request with Plan (dev)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tfPlanOutput = `${{ steps.plan.outputs.stdout }}`;
            const comment = `## 🏗️ Azure Terraform Plan - dev\n\n\`\`\`terraform\n${tfPlanOutput}\n\`\`\`\n\n**Plan Status**: ${{ steps.plan.outcome }}\n**Validation**: ${{ steps.validate.outcome }}\n**Format**: ${{ steps.fmt.outcome }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Terraform Apply - Dev
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        id: apply-dev
        run: terraform apply -var-file=dev.tfvars -no-color -auto-approve -input=false

  terraform-prod:
    name: Terraform (prod)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/azure
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=backend-prod.hcl

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan (prod)
        id: plan
        run: terraform plan -var-file=prod.tfvars -no-color -input=false
        continue-on-error: true

      - name: Terraform Apply - Prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: apply-prod
        run: terraform apply -var-file=prod.tfvars -no-color -auto-approve -input=false
