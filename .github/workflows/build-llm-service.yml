name: Build and Push LLM Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "services/llm/**"
      - ".github/workflows/build-llm-service.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      - name: Azure Login
        run: |
          az login --service-principal -u ${{ secrets.ARM_CLIENT_ID }} -p ${{ secrets.ARM_CLIENT_SECRET }} --tenant ${{ secrets.ARM_TENANT_ID }}
          az account set -s ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name databro${{ env.ENV_NAME }}acr

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/llm
          push: true
          tags: |
            databro${{ env.ENV_NAME }}acr.azurecr.io/llm-service:latest
            databro${{ env.ENV_NAME }}acr.azurecr.io/llm-service:${{ github.sha }}
          build-args: |
             MODEL_NAME=llama3.2

      - name: Create Container App YAML definition
        run: |
          cat <<EOF > llm-service.yaml
          properties:
            configuration:
              ingress:
                external: false
                targetPort: 11434
            template:
              containers:
                - name: ollama
                  image: databro${{ env.ENV_NAME }}acr.azurecr.io/llm-service:${{ github.sha }}
                  resources:
                    cpu: 2.0
                    memory: 4.0Gi
          EOF

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          registryUrl: databro${{ env.ENV_NAME }}acr.azurecr.io
          yamlConfigPath: llm-service.yaml
          containerAppName: llm-service
          resourceGroup: databro-${{ env.ENV_NAME }}-rg
