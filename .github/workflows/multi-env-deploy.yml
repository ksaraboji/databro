name: Build and Deploy Application

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'lib/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/multi-env-deploy.yml'
  workflow_run:
    jobs:
      deploy-dev:
        name: Build & Deploy (dev)
        runs-on: ubuntu-latest
        if: |
          github.event_name == 'push' && github.ref_name == 'develop' ||
          github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop' ||
          github.event_name == 'pull_request'

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: 20.x
              cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Run linter
            run: npm run lint
            continue-on-error: true

          - name: Build Next.js application
            run: npm run build
            env:
              CI: true

          - name: Generate build metadata
            id: build-info
            run: |
              echo "build_id=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
              echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
              echo "git_branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

          - name: Upload build artifact
            uses: actions/upload-artifact@v4
            with:
              name: nextjs-build-${{ steps.build-info.outputs.build_id }}
              path: |
                .next/
                public/
              retention-days: 5

          - name: Try to get Terraform outputs (dev)
            id: tf-outputs
            run: |
              set -e
              cd terraform || exit 0
              terraform init -input=false || true
              S3=$(terraform output -raw -var-file=dev.tfvars s3_bucket_name 2>/dev/null || echo "")
              CF_ID=$(terraform output -raw -var-file=dev.tfvars cloudfront_distribution_id 2>/dev/null || echo "")
              CF_DOMAIN=$(terraform output -raw -var-file=dev.tfvars cloudfront_domain_name 2>/dev/null || echo "")
              echo "DEV_S3_BUCKET=$S3" >> $GITHUB_ENV
              echo "DEV_CF_ID=$CF_ID" >> $GITHUB_ENV
              echo "DEV_CF_DOMAIN=$CF_DOMAIN" >> $GITHUB_ENV
            continue-on-error: true

          - name: Configure AWS credentials (for deploy)
            if: github.event_name != 'pull_request'
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: us-east-2

          - name: Deploy to Dev S3
            if: github.event_name != 'pull_request'
            run: |
              DEV_BUCKET="${DEV_S3_BUCKET:-${{ secrets.DEV_S3_BUCKET_NAME }}}"
              echo "📤 Uploading to S3 bucket: $DEV_BUCKET"
              if [ -d ".next/static" ]; then
                aws s3 sync .next/static s3://$DEV_BUCKET/_next/static --delete \
                  --cache-control "public, max-age=31536000, immutable"
              fi
              if [ -d "public" ]; then
                aws s3 sync public s3://$DEV_BUCKET/ --delete \
                  --cache-control "public, max-age=3600"
              fi
              find .next -name "*.html" | while read file; do
                s3_path="${file#.next/}"
                aws s3 cp "$file" "s3://$DEV_BUCKET/$s3_path" \
                  --content-type "text/html" \
                  --cache-control "public, max-age=0, must-revalidate"
              done
              echo "✅ Dev S3 deployment completed"

          - name: Invalidate Dev CloudFront cache
            if: github.event_name != 'pull_request' && env.DEV_CF_ID != ''
            run: |
              echo "🔄 Invalidating CloudFront cache..."
              aws cloudfront create-invalidation \
                --distribution-id ${DEV_CF_ID:-${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}} \
                --paths "/*"
              echo "✅ CloudFront invalidation completed"

          - name: Dev deployment summary
            run: |
              echo "## ✅ Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Environment**: Development" >> $GITHUB_STEP_SUMMARY
              echo "**S3 Bucket**: ${DEV_S3_BUCKET:-${{ secrets.DEV_S3_BUCKET_NAME }}}" >> $GITHUB_STEP_SUMMARY
              echo "**Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
              echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      deploy-prod:
        name: Build & Deploy (prod)
        runs-on: ubuntu-latest
        if: |
          github.event_name == 'push' && github.ref_name == 'main' ||
          github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' ||
          github.event_name == 'pull_request'

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: 20.x
              cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Run linter
            run: npm run lint
            continue-on-error: true

          - name: Build Next.js application
            run: npm run build
            env:
              CI: true

          - name: Generate build metadata
            id: build-info
            run: |
              echo "build_id=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
              echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
              echo "git_branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

          - name: Upload build artifact
            uses: actions/upload-artifact@v4
            with:
              name: nextjs-build-${{ steps.build-info.outputs.build_id }}
              path: |
                .next/
                public/
              retention-days: 5

          - name: Try to get Terraform outputs (prod)
            id: tf-outputs
            run: |
              set -e
              cd terraform || exit 0
              terraform init -input=false || true
              S3=$(terraform output -raw -var-file=prod.tfvars s3_bucket_name 2>/dev/null || echo "")
              CF_ID=$(terraform output -raw -var-file=prod.tfvars cloudfront_distribution_id 2>/dev/null || echo "")
              CF_DOMAIN=$(terraform output -raw -var-file=prod.tfvars cloudfront_domain_name 2>/dev/null || echo "")
              echo "PROD_S3_BUCKET=$S3" >> $GITHUB_ENV
              echo "PROD_CF_ID=$CF_ID" >> $GITHUB_ENV
              echo "PROD_CF_DOMAIN=$CF_DOMAIN" >> $GITHUB_ENV
            continue-on-error: true

          - name: Configure AWS credentials (for deploy)
            if: github.event_name != 'pull_request'
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: us-east-2

          - name: Deploy to Prod S3
            if: github.event_name != 'pull_request'
            run: |
              PROD_BUCKET="${PROD_S3_BUCKET:-${{ secrets.PROD_S3_BUCKET_NAME }}}"
              echo "📤 Uploading to S3 bucket: $PROD_BUCKET"
              if [ -d ".next/static" ]; then
                aws s3 sync .next/static s3://$PROD_BUCKET/_next/static --delete \
                  --cache-control "public, max-age=31536000, immutable"
              fi
              if [ -d "public" ]; then
                aws s3 sync public s3://$PROD_BUCKET/ --delete \
                  --cache-control "public, max-age=3600"
              fi
              find .next -name "*.html" | while read file; do
                s3_path="${file#.next/}"
                aws s3 cp "$file" "s3://$PROD_BUCKET/$s3_path" \
                  --content-type "text/html" \
                  --cache-control "public, max-age=0, must-revalidate"
              done
              echo "✅ Prod S3 deployment completed"

          - name: Invalidate Prod CloudFront cache
            if: github.event_name != 'pull_request' && env.PROD_CF_ID != ''
            run: |
              echo "🔄 Invalidating CloudFront cache..."
              aws cloudfront create-invalidation \
                --distribution-id ${PROD_CF_ID:-${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}} \
                --paths "/*"
              echo "✅ CloudFront invalidation completed"

          - name: Create GitHub deployment
            if: github.event_name != 'pull_request'
            uses: actions/github-script@v7
            with:
              script: |
                github.rest.repos.createDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.ref,
                  environment: 'production',
                  description: 'Production deployment',
                  required_contexts: []
                });

          - name: Prod deployment summary
            run: |
              echo "## ✅ Prod Deployment Complete" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Environment**: Production" >> $GITHUB_STEP_SUMMARY
              echo "**S3 Bucket**: ${PROD_S3_BUCKET:-${{ secrets.PROD_S3_BUCKET_NAME }}}" >> $GITHUB_STEP_SUMMARY
              echo "**Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
              echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: https://${PROD_CF_DOMAIN:-${{ secrets.PROD_CLOUDFRONT_DOMAIN }}}" >> $GITHUB_STEP_SUMMARY
      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Production deployment',
              required_contexts: []
            });

      - name: Prod deployment summary
        if: success()
        run: |
          echo "## ✅ Prod Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket**: ${{ env.PROD_S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: https://${{ env.PROD_CF_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
