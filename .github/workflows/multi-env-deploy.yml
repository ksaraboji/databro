name: Build and Deploy Application

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/multi-env-deploy.yml"
      # We must include terraform paths here so the push trigger fires for mixed commits!
      - "terraform/aws/**"
  workflow_call:
    inputs:
      from_terraform:
        description: "Indicates if this workflow is called by the Terraform workflow"
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "tsconfig.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-app
  cancel-in-progress: false

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      run_dev: ${{ steps.decision.outputs.run_dev }}
      run_prod: ${{ steps.decision.outputs.run_prod }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Ensure we check out the correct commit for workflow_run
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Decision Logic
        id: decision
        run: |
          # Detect changed files
          # Universal logic: Use 'before' SHA if available (push/workflow_call), else default to HEAD~1
          BEFORE_SHA="${{ github.event.before }}"
          
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            echo "Event with history detected (Push/Call). Diffing between $BEFORE_SHA and ${{ github.sha }}"
            CHANGED_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.sha }})
          else
            echo "PR or single-depth event. Diffing HEAD~1..HEAD"
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "🔍 Changed files detected:"
          echo "$CHANGED_FILES"

          # Check for matches
          HAS_APP_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^(app/|components/|lib/|public/|package.json|package-lock.json|tsconfig.json|.github/workflows/multi-env-deploy.yml)' || echo "false")
          HAS_TF_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^(terraform/aws/|.github/workflows/deploy-aws-infra.yml)' || echo "false")

          if [ "$HAS_APP_CHANGES" != "false" ]; then HAS_APP_CHANGES="true"; fi
          if [ "$HAS_TF_CHANGES" != "false" ]; then HAS_TF_CHANGES="true"; fi

          echo "App changes: $HAS_APP_CHANGES"
          echo "Terraform changes: $HAS_TF_CHANGES"

          EVENT="${{ github.event_name }}"
          BRANCH="${{ github.ref_name }}"
          IS_CALLED_BY_TF="${{ inputs.from_terraform }}"

          # 1. Called explicitly by Terraform workflow
          if [ "$IS_CALLED_BY_TF" == "true" ]; then
             echo "✅ Called explicitly by Terraform workflow. RUNNING."
             RUN_DEPLOY="true"

          # 2. Standard workflow_call logic
          elif [ "$EVENT" == "workflow_call" ]; then
             echo "✅ Workflow_call logic. Checking for app changes..."
             if [ "$HAS_APP_CHANGES" == "true" ]; then
                RUN_DEPLOY="true"
             else
                echo "ℹ️ Called by workflow but no app changes. SKIPPING."
                RUN_DEPLOY="false"
             fi

          elif [ "$EVENT" == "pull_request" ]; then
             if [ "$HAS_APP_CHANGES" == "true" ]; then RUN_DEPLOY="true"; fi

          elif [ "$EVENT" == "push" ]; then
             if [ "$HAS_APP_CHANGES" == "true" ]; then
                if [ "$HAS_TF_CHANGES" == "true" ]; then
                   echo "🛑 Both App and Terraform changed. Push event. SKIPPING (Expecting 'Terraform' workflow to call this)."
                   RUN_DEPLOY="false"
                else
                   echo "✅ Only App changed. Push event. RUNNING."
                   RUN_DEPLOY="true"
                fi
             else
                echo "ℹ️ No app changes in this push (likely Terraform only). SKIPPING."
                RUN_DEPLOY="false"
             fi
          fi

          RUN_DEV="false"
          RUN_PROD="false"

          if [ "$RUN_DEPLOY" == "true" ]; then
            if [ "$BRANCH" == "develop" ]; then RUN_DEV="true"; fi
            if [ "$BRANCH" == "main" ]; then RUN_PROD="true"; fi
            # Allow PRs to run dev job
            if [ "$EVENT" == "pull_request" ]; then RUN_DEV="true"; fi
          fi

          echo "run_dev=$RUN_DEV" >> $GITHUB_OUTPUT
          echo "run_prod=$RUN_PROD" >> $GITHUB_OUTPUT

  deploy-dev:
    name: Build & Deploy (dev)
    needs: check-changes
    if: needs.check-changes.outputs.run_dev == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build Next.js application
        run: npm run build
        env:
          CI: true

      - name: Generate build metadata
        id: build-info
        run: |
          echo "build_id=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "git_branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (for deploy)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Try to get Terraform outputs (dev)
        id: tf-outputs
        run: |
          set -e
          cd terraform || exit 0
          terraform init -backend-config=backend-dev.hcl -input=false
          S3=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "DEV_S3_BUCKET=$S3" >> $GITHUB_ENV
          echo "DEV_CF_ID=$CF_ID" >> $GITHUB_ENV
        continue-on-error: true

      - name: Deploy to Dev S3
        if: github.event_name != 'pull_request'
        run: |
          DEV_BUCKET="${DEV_S3_BUCKET:-${{ secrets.DEV_S3_BUCKET_NAME }}}"
          echo "📤 Uploading to S3 bucket: $DEV_BUCKET"
          # Sync _next folder with long cache
          if [ -d "out/_next" ]; then
            aws s3 sync out/_next s3://$DEV_BUCKET/_next --delete --cache-control "public, max-age=31536000, immutable"
          fi
          # Sync everything else with short cache
          aws s3 sync out s3://$DEV_BUCKET --delete --exclude "_next/*" --cache-control "public, max-age=0, must-revalidate"
          echo "✅ Dev S3 deployment completed"

      - name: Invalidate Dev CloudFront cache
        if: github.event_name != 'pull_request' && env.DEV_CF_ID != ''
        run: |
          aws cloudfront create-invalidation --distribution-id ${DEV_CF_ID:-${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}} --paths "/*"

      - name: Dev deployment summary
        run: |
          echo "## ✅ Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Build & Deploy (prod)
    needs: check-changes
    if: needs.check-changes.outputs.run_prod == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build Next.js application
        run: npm run build
        env:
          CI: true

      - name: Generate build metadata
        id: build-info
        run: |
          echo "build_id=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "git_branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (for deploy)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Try to get Terraform outputs (prod)
        id: tf-outputs
        run: |
          set -e
          cd terraform || exit 0
          terraform init -backend-config=backend-prod.hcl -input=false
          S3=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          CF_DOMAIN=$(terraform output -raw cloudfront_domain_name)
          echo "PROD_S3_BUCKET=$S3" >> $GITHUB_ENV
          echo "PROD_CF_ID=$CF_ID" >> $GITHUB_ENV
          echo "PROD_CF_DOMAIN=$CF_DOMAIN" >> $GITHUB_ENV
        continue-on-error: true

      - name: Deploy to Prod S3
        if: github.event_name != 'pull_request'
        run: |
          PROD_BUCKET="${PROD_S3_BUCKET:-${{ secrets.PROD_S3_BUCKET_NAME }}}"
          echo "📤 Uploading to S3 bucket: $PROD_BUCKET"
          # Sync _next folder with long cache
          if [ -d "out/_next" ]; then
            aws s3 sync out/_next s3://$PROD_BUCKET/_next --delete --cache-control "public, max-age=31536000, immutable"
          fi
          # Sync everything else with short cache
          aws s3 sync out s3://$PROD_BUCKET --delete --exclude "_next/*" --cache-control "public, max-age=0, must-revalidate"
          echo "✅ Prod S3 deployment completed"

      - name: Invalidate Prod CloudFront cache
        if: github.event_name != 'pull_request' && env.PROD_CF_ID != ''
        run: |
          aws cloudfront create-invalidation --distribution-id ${PROD_CF_ID:-${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}} --paths "/*"

      - name: Create GitHub deployment
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Production deployment',
              required_contexts: []
            });

      - name: Prod deployment summary
        run: |
          echo "## ✅ Prod Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://${PROD_CF_DOMAIN:-${{ secrets.PROD_CLOUDFRONT_DOMAIN }}}" >> $GITHUB_STEP_SUMMARY
